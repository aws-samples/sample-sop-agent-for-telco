stages:
  - test
  - notify

unit-tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir pytest pytest-mock pytest-asyncio fastapi httpx boto3 requests aiofiles strands-agents strands-agents-builder strands-agents-evals python-docx PyPDF2 || true
  script:
    - python -m pytest tests/ -v --tb=short --junitxml=report.xml
  artifacts:
    reports:
      junit: report.xml
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

slack-notify:
  stage: notify
  image: curlimages/curl:latest
  needs: [unit-tests]
  script:
    - |
      if [ -z "$SLACK_WEBHOOK_URL" ]; then
        echo "SLACK_WEBHOOK_URL not set — skipping notification"
        exit 0
      fi
      if [ "$CI_JOB_STATUS" = "success" ] || [ -z "$CI_JOB_STATUS" ]; then
        STATUS="✅ PASSED"
        COLOR="#36a64f"
      else
        STATUS="❌ FAILED"
        COLOR="#dc3545"
      fi
      curl -s -X POST "$SLACK_WEBHOOK_URL" \
        -H 'Content-type: application/json' \
        -d "{
          \"attachments\": [{
            \"color\": \"$COLOR\",
            \"title\": \"$STATUS — $CI_PROJECT_NAME\",
            \"text\": \"Branch: \`$CI_COMMIT_REF_NAME\`\nCommit: $CI_COMMIT_SHORT_SHA — $CI_COMMIT_MESSAGE\nPipeline: $CI_PIPELINE_URL\",
            \"footer\": \"GitLab CI\"
          }]
        }"
  when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
