name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check
        run: |
          pip install mypy
          mypy sop-agent/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          AWS_DEFAULT_REGION: us-west-2

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t sop-agent:test .

      - name: Build test image
        run: docker build -f Dockerfile.test -t sop-agent:test-image .

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/sample-sop-agent-for-strands/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build frontend
        working-directory: webui/frontend
        run: |
          npm ci
          npx vite build
