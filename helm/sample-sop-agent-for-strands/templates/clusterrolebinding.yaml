{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sample-sop-agent-for-strands.fullname" . }}
  labels:
    {{- include "sample-sop-agent-for-strands.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "sample-sop-agent-for-strands.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "sample-sop-agent-for-strands.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
