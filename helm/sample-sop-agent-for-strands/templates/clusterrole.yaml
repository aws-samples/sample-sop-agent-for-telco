{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sample-sop-agent-for-strands.fullname" . }}
  labels:
    {{- include "sample-sop-agent-for-strands.labels" . | nindent 4 }}
rules:
# Read-only access for monitoring and troubleshooting
- apiGroups: ["", "apps", "networking.k8s.io"]
  resources: ["pods", "services", "deployments", "replicasets", "configmaps", "namespaces", "endpoints", "events"]
  verbs: ["get", "list", "watch"]
# Pod logs for troubleshooting
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Limited write access for SOP execution
# NOTE: This ClusterRole grants write access cluster-wide to support multi-namespace
# SOP execution (e.g., deploying NFs across different namespaces). For production use,
# replace with a namespaced Role scoped to specific target namespaces to follow the
# principle of least privilege.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create", "update", "patch"]
- apiGroups: [""]
  resources: ["services", "configmaps"]
  verbs: ["create", "update", "patch"]
{{- end }}
